<svg viewBox="0 0 900 1600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="stripShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- White photostrip background -->
  <rect x="0" y="0" width="900" height="1600" fill="#fff" filter="url(#stripShadow)"/>

  <!-- Bootom brand area -->
  <rect x="0" y="1520" width="900" height="80" fill="#f8f8f8"/>
  <line x1="100" y1="1530" x2="800" y2="1530" stroke="#ddd" stroke-width="1"/>

  <!-- Scissor guide lines -->
  <line x1="20" y1="1590" x2="880" y2="1590" stroke="#ccc" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="890" y="1590" font-family="'Courier New', monospace" font-size="14" fill="#bbb" text-anchor="end">-- cut --</text>

  <!-- Rounded corners -->
  <rect x="0" y="0" width="900" height="1600" fill="none" stroke="#e0e0e0" stroke-width="2" rx="12"/>
</svg>