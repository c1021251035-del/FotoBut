<svg viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer white border with subtle shadow -->
  <rect x="0" y="0" width="1080" height="1350" fill="#fafafa" rx="0"/>

  <!-- Photo area mask (white area where photo goes) -->
  <rect x="90" y="80" width="900" height="900" fill="#fff" rx="0"/>

  <!-- Bottom white area for caption -->
  <rect x="0" y="1080" width="1080" height="270" fill="#fafafa" rx="0"/>

  <!-- Subtle paper texture overlay -->
  <defs>
    <filter id="paperTexture" x="0" y="0" width="1080" height="1350" filterUnits="userSpaceOnUse">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feBlend in="SourceGraphic" in2="noise" mode="multiply"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Frame border shadow -->
  <rect x="0" y="0" width="1080" height="1350" fill="none" stroke="none" filter="url(#shadow)"/>
</svg>