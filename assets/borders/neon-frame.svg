<svg viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neonGlowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur1"/>
      <feGaussianBlur stdDeviation="24" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonGlowPink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur1"/>
      <feGaussianBlur stdDeviation="20" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect x="0" y="0" width="1080" height="1350" fill="#0a0a1a"/>

  <!-- Cyan neon border -->
  <rect x="40" y="40" width="1000" height="1270" fill="none" stroke="#00ffff" stroke-width="3" rx="24" filter="url(#neonGlowCyan)"/>

  <!-- Pink neon inner border -->
  <rect x="60" y="60" width="960" height="1230" fill="none" stroke="#ff00ff" stroke-width="2" rx="16" filter="url(#neonGlowPink)"/>

  <!-- Decorative corner neon lines -->
  <g stroke="#00ffff" stroke-width="3" filter="url(#neonGlowCyan)">
    <!-- Top-left -->
    <line x1="40" y1="80" x2="40" y2="40"/>
    <line x1="40" y1="40" x2="80" y2="40"/>
    <!-- Top-right -->
    <line x1="1000" y1="40" x2="1040" y2="40"/>
    <line x1="1040" y1="40" x2="1040" y2="80"/>
  </g>
  <g stroke="#ff00ff" stroke-width="3" filter="url(#neonGlowPink)">
    <!-- Bottom-left -->
    <line x1="60" y1="1290" x2="60" y2="1260"/>
    <line x1="60" y1="1290" x2="90" y2="1290"/>
    <!-- Bottom-right -->
    <line x1="1020" y1="1290" x2="990" y2="1290"/>
    <line x1="1020" y1="1290" x2="1020" y2="1260"/>
  </g>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.03">
    <line x1="0" y1="300" x2="1080" y2="300"/>
    <line x1="0" y1="600" x2="1080" y2="600"/>
    <line x1="0" y1="900" x2="1080" y2="900"/>
    <line x1="300" y1="0" x2="300" y2="1350"/>
    <line x1="600" y1="0" x2="600" y2="1350"/>
    <line x1="900" y1="0" x2="900" y2="1350"/>
  </g>
</svg>