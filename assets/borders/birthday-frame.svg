<svg viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="birthdayGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="confettiGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ffd93d"/>
    </radialGradient>
    <pattern id="confetti" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect x="5" y="5" width="8" height="12" fill="url(#confettiGrad)" transform="rotate(15)"/>
      <rect x="25" y="15" width="6" height="6" fill="#6" transform="rotate(-30)"/>
      <rect x="15" y="30" width="10" height="4" fill="#00ffff" transform="rotate(45)"/>
    </pattern>
  </defs>

  <!-- Light background with confetti -->
  <rect x="0" y="0" width="1080" height="1350" fill="#fff8e7"/>
  <rect x="0" y="0" width="1080" height="1350" fill="url(#confetti)" opacity="0.15"/>

  <!-- Colorful border -->
  <rect x="25" y="25" width="1030" height="1300" fill="none" stroke="#ff6b6b" stroke-width="6" rx="28" filter="url(#birthdayGlow)"/>
  <rect x="40" y="40" width="1000" height="1270" fill="none" stroke="#ffd93d" stroke-width="3" rx="20"/>

  <!-- Balloon corners -->
  <g font-size="64" text-anchor="middle">
    <text x="90" y="120">🎈</text>
    <text x="990" y="120">🎈</text>
    <text x="90" y="1270">🎂</text>
    <text x="990" y="1270">🎁</text>
  </g>

  <!-- String from balloons to photo -->
  <g stroke="#888" stroke-width="2" fill="none" stroke-dasharray="4,4">
    <path d="M90 140 Q200 300 400 500 M990 140 Q800 300 600 500"/>
  </g>

  <!-- Party hat top center -->
  <text x="540" y="100" text-anchor="middle" font-size="56">🎉</text>

  <!-- Confetti explosion top -->
  <g opacity="0.3">
    <circle cx="200" cy="80" r="6" fill="#ff6b6b"/>
    <circle cx="300" cy="60" r="4" fill="#ffd93d"/>
    <circle cx="400" cy="90" r="5" fill="#00ffff"/>
    <circle cx="680" cy="60" r="4" fill="#ff6b6b"/>
    <circle cx="780" cy="90" r="5" fill="#ffd93d"/>
    <circle cx="880" cy="70" r="6" fill="#00ffff"/>
  </g>

  <!-- Happy Birthday banner -->
  <g transform="translate(540, 160)">
    <ellipse cx="0" cy="0" rx="250" ry="45" fill="#ff6b6b" filter="url(#birthdayGlow)"/>
    <text x="0" y="16" text-anchor="middle" font-family="'Bangers', cursive" font-size="38" fill="#fff">HAPPY BIRTHDAY! 🎂</text>
  </g>

  <!-- Side streamers -->
  <g stroke-width="4" fill="none" opacity="0.6">
    <path d="M50 200 Q30 400 50 600 Q30 800 50 1000 Q30 1200 50 1300" stroke="#ff6b6b"/>
    <path d="M1030 200 Q1050 400 1030 600 Q1050 800 1030 1000 Q1050 1200 1030 1300" stroke="#00ffff"/>
  </g>
</svg>