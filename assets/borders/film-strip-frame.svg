<svg viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="filmShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Main film strip background -->
  <rect x="0" y="0" width="1080" height="1920" fill="#0a0a0a"/>

  <!-- Film perforations left -->
  <g fill="#1a1a1a">
    <rect x="20" y="0" width="30" height="1920" fill="#1a1a1a"/>
    <rect x="20" y="0" width="30" height="1920" fill="url(#perfPattern)" />
  </g>

  <!-- Film perforations right -->
  <g fill="#1a1a1a">
    <rect x="1030" y="0" width="30" height="1920" fill="#1a1a1a"/>
  </g>

  <!-- Frame numbers on left -->
  <g font-family="'Courier New', monospace" font-size="24" fill="#444" text-anchor="middle">
    <text x="35" y="120">1</text>
    <text x="35" y="550">2</text>
    <text x="35" y="980">3</text>
    <text x="35" y="1410">4</text>
  </g>

  <!-- Frame numbers on right -->
  <g font-family="'Courier New', monospace" font-size="24" fill="#444" text-anchor="middle">
    <text x="1045" y="120">1</text>
    <text x="1045" y="550">2</text>
    <text x="1045" y="980">3</text>
    <text x="1045" y="1410">4</text>
  </g>

  <!-- Kodak-style edge markings -->
  <g font-family="'Courier New', monospace" font-size="16" fill="#333" text-anchor="start">
    <text x="10" y="1900" transform="rotate(-90, 10, 1900)">KODAK SAFETY FILM</text>
    <text x="1060" y="1900" transform="rotate(90, 1060, 1900)" text-anchor="end">5247</text>
  </g>
</svg>