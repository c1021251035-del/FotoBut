<svg viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="weddingGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#c9a962"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
  </defs>

  <!-- Cream background -->
  <rect x="0" y="0" width="1080" height="1350" fill="#fdf8f5"/>

  <!-- Lace border outer -->
  <rect x="20" y="20" width="1040" height="1310" fill="none" stroke="url(#goldGradient)" stroke-width="8" rx="24" filter="url(#weddingGlow)"/>
  <rect x="35" y="35" width="1010" height="1280" fill="none" stroke="#f5e6d3" stroke-width="4" rx="16"/>

  <!-- Lace pattern top/bottom -->
  <g stroke="#c9a962" stroke-width="2" fill="none" opacity="0.6">
    <path d="M50 50 Q100 20 150 50 Q200 20 250 50 Q300 20 350 50 Q400 20 450 50 Q500 20 550 50 Q600 20 650 50 Q700 20 750 50 Q800 20 850 50 Q900 20 950 50 Q1000 20 1030 50"/>
    <path d="M50 1300 Q100 1330 150 1300 Q200 1330 250 1300 Q300 1330 350 1300 Q400 1330 450 1300 Q500 1330 550 1300 Q600 1330 650 1300 Q700 1330 750 1300 Q800 1330 850 1300 Q900 1330 950 1300 Q1000 1330 1030 1300"/>
  </g>

  <!-- Floral corners -->
  <g font-size="60" text-anchor="middle" opacity="0.8">
    <text x="100" y="130">🌸</text>
    <text x="980" y="130">🌹</text>
    <text x="100" y="1270">🌿</text>
    <text x="980" y="1270">💍</text>
  </g>

  <!-- Doves top center -->
  <text x="540" y="100" text-anchor="middle" font-size="48">🕊️</text>

  <!-- Rings bottom center -->
  <text x="540" y="1290" text-anchor="middle" font-size="48">💍</text>

  <!-- Side swags -->
  <g stroke="#c9a962" stroke-width="3" fill="none" opacity="0.4">
    <path d="M50 300 Q30 400 50 500 Q30 600 50 700 Q30 800 50 900 Q30 1000 50 1100"/>
    <path d="M1030 300 Q1050 400 1030 500 Q1050 600 1030 700 Q1050 800 1030 900 Q1050 1000 1030 1100"/>
  </g>

  <!-- Just Married banner -->
  <g transform="translate(540, 140)">
    <ellipse cx="0" cy="0" rx="220" ry="40" fill="url(#goldGradient)" filter="url(#weddingGlow)"/>
    <text x="0" y="14" text-anchor="middle" font-family="'Caveat', cursive" font-size="36" fill="#3d2b0b">Just Married 💕</text>
  </g>
</svg>