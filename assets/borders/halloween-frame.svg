<svg viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="halloweenGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="bats" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M10 40 Q20 20 40 40 Q20 60 10 40" fill="#000" opacity="0.1" transform="scale(0.5) translate(160,160)"/>
      <path d="M40 40 Q50 20 70 40 Q50 60 40 40" fill="#000" opacity="0.1" transform="scale(0.5) translate(160,160)"/>
    </pattern>
  </defs>

  <!-- Dark background with subtle bats -->
  <rect x="0" y="0" width="1080" height="1350" fill="#1a0a0a"/>
  <rect x="0" y="0" width="1080" height="1350" fill="url(#bats)"/>

  <!-- Orange spider-web border -->
  <rect x="20" y="20" width="1040" height="1310" fill="none" stroke="#ff8c00" stroke-width="4" rx="24" filter="url(#halloweenGlow)"/>
  <rect x="35" y="35" width="1010" height="1280" fill="none" stroke="#8b4513" stroke-width="2" rx="16"/>

  <!-- Spider web corners -->
  <g stroke="#ff8c00" stroke-width="2" fill="none" opacity="0.8">
    <!-- Top-left web -->
    <path d="M40 40 L40 180 M40 40 L180 40 M40 40 L130 130 M40 90 L90 40 M40 130 L130 40 M40 40 Q20 20 0 0"/>
    <!-- Top-right web -->
    <path d="M1040 40 L1040 180 M1040 40 L900 40 M1040 40 L950 130 M990 40 L1040 90 M950 40 L1040 130 M1080 0 Q1060 20 1040 40"/>
    <!-- Bottom-left -->
    <path d="M40 1310 L40 1170 M40 1310 L180 1310 M40 1310 L130 1220 M40 1260 L90 1310 M40 1220 L130 1310 M0 1350 Q20 1330 40 1310"/>
    <!-- Bottom-right -->
    <path d="M1040 1310 L1040 1170 M1040 1310 L900 1310 M1040 1310 L950 1220 M1040 1260 L990 1310 M1040 1220 L950 1310 M1080 1350 Q1060 1330 1040 1310"/>
  </g>

  <!-- Corner icons -->
  <g font-size="56" text-anchor="middle">
    <text x="90" y="110">🕷️</text>
    <text x="990" y="110">👻</text>
    <text x="90" y="1280">🎃</text>
    <text x="990" y="1280">🦇</text>
  </g>

  <!-- Skull top center -->
  <text x="540" y="80" text-anchor="middle" font-size="40">☠️</text>

  <!-- Pumpkins bottom center -->
  <text x="540" y="1300" text-anchor="middle" font-size="40">🎃</text>
</svg>