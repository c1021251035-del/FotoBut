<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#111">
  <meta name="description" content="Fotobut - Real-time Webcam Effects">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/svg+xml" href="./assets/icon.svg">
  <title>Fotobut - Webcam Effects</title>
  <link rel="stylesheet" href="./css/main.css">
</head>
<body>

<div class="app" id="app">
  <!-- Camera Stage -->
  <div class="stage" id="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="countdown" id="countdown"></div>
    <div class="flash" id="flash"></div>
  </div>

  <!-- Effects Bar -->
  <div class="effects-bar" id="effects-bar">
    <div class="effect-indicator" id="effect-name">Normal</div>
    <input type="range" id="effect-slider" class="effect-slider" min="0" max="100" value="0" style="display:none">
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn" id="btn-flip" title="Flip Camera">🔄</button>
    <button class="btn btn-capture" id="btn-capture" title="Capture">📷</button>
    <button class="btn" id="btn-flash" title="Flash">⚡</button>
  </div>

  <!-- Gallery Button -->
  <div class="gallery-btn" id="btn-gallery" title="Gallery">🖼️</div>

  <!-- Result Panel -->
  <div class="result-panel hidden" id="result-panel">
    <button class="close-btn" id="btn-close-result">✕</button>
    <canvas id="result-canvas"></canvas>
    <div class="result-actions">
      <button class="btn" id="btn-retake">↩️</button>
      <button class="btn btn-primary" id="btn-download">💾</button>
      <button class="btn" id="btn-share">📤</button>
    </div>
  </div>

  <!-- Gallery Modal -->
  <div class="gallery-modal hidden" id="gallery-modal">
    <div class="gal-header">
      <span>Gallery</span>
      <button class="gal-close" id="gal-close">✕</button>
    </div>
    <div class="gal-grid" id="gal-grid"></div>
    <div class="gal-empty hidden" id="gal-empty">Belum ada foto</div>
  </div>
</div>

<script src="./js/store.js"></script>
<script src="./js/camera.js"></script>
<script src="./js/effects.js"></script>
<script src="./js/canvas.js"></script>
<script src="./js/export.js"></script>
<script src="./js/photodb.js"></script>
<script src="./js/gallery.js"></script>
<script src="./js/timer.js"></script>
<script src="./js/app.js"></script>

</body>
</html>
