<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="Fotobut — Web photobooth with fun borders">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>Fotobut — Photobooth</title>
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/templates.css">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Bangers&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="app" id="app">

  <!-- Header -->
  <header class="header">
    <h1>📸 Fotobut</h1>
    <div class="header-actions">
      <button class="btn btn-icon" id="btn-gallery" title="Gallery">🖼️</button>
      <button class="btn btn-icon" id="btn-torch" style="display:none" title="Torch">🔦</button>
    </div>
  </header>

  <!-- Template bar -->
  <div class="template-bar" id="template-bar"></div>

  <!-- Stage (preview) -->
  <div class="stage" id="stage">
    <div class="canvas-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="preview-canvas"></canvas>
      <div class="countdown" id="countdown"></div>
    </div>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar" id="effect-filters">
    <button class="filter-btn active" data-filter="none">✨ Normal</button>
    <button class="filter-btn" data-filter="sepia">🎞️ Sepia</button>
    <button class="filter-btn" data-filter="bw">⚫ B&W</button>
    <button class="filter-btn" data-filter="vintage">📻 Vintage</button>
    <button class="filter-btn" data-filter="warm">☀️ Warm</button>
    <button class="filter-btn" data-filter="cool">❄️ Cool</button>
    <button class="filter-btn" data-filter="glitch">📺 Glitch</button>
    <button class="filter-btn" data-filter="pixelate">🟦 Pixel</button>
  </div>

  <!-- Sticker slide panel -->
  <div class="slide-panel" id="sticker-panel"></div>

  <!-- Text editor panel -->
  <div class="editor-panel" id="editor-panel"></div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn" id="btn-flip" style="display:none" title="Flip camera">🔄</button>
    <button class="btn" id="btn-sticker" title="Stickers">🌟</button>
    <button class="btn btn-primary" id="btn-capture" title="Capture">📷</button>
    <button class="btn" id="btn-text" title="Text">✏️</button>
    <button class="btn" id="btn-editor" title="Template Editor">🎨</button>
    <button class="btn btn-icon" id="btn-retake" title="Retake">↩️</button>
  </div>

  <!-- Result panel -->
  <div class="result-panel hidden" id="result-panel">
    <canvas id="result-canvas"></canvas>
    <div class="result-actions">
      <button class="btn" id="btn-retake-result">↩️ Retake</button>
      <button class="btn btn-primary" id="btn-download">💾 Download</button>
      <button class="btn" id="btn-download-gif" style="display:none">🎞️ GIF</button>
      <button class="btn" id="btn-share">📤 Share</button>
    </div>
  </div>

</div>

<!-- Gallery modal -->
<div class="gallery-modal" id="gallery-modal"></div>

<!-- Scripts -->
<script src="./js/store.js"></script>
<script src="./js/photodb.js"></script>
<script src="./js/gallery.js"></script>
<script src="./js/camera.js"></script>
<script src="./js/effects.js"></script>
<script src="./js/templates.js"></script>
<script src="./js/timer.js"></script>
<script src="./js/overlays.js"></script>
<script src="./js/export.js"></script>
<script src="./js/canvas.js"></script>
<script src="./js/text-editor.js"></script>
<script src="./js/gif.js"></script>
<script src="./js/sound.js"></script>
<script src="./js/template-editor.js"></script>
<script src="./js/template-editor.js"></script>
<script src="./js/app.js"></script>

</body>
</html>
